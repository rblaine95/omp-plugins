name: Clean PR Cache

on:
  pull_request:
    types:
      - closed

permissions: {}

jobs:
  cleanup:
    name: Clean PR Cache
    runs-on: ubuntu-24.04
    permissions:
      # `actions:write` permission is required to delete caches
      #   See also: https://docs.github.com/en/rest/actions/cache?apiVersion=2022-11-28#delete-a-github-actions-cache-for-a-repository-using-a-cache-id
      actions: write
    steps:
      - name: Cleanup
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          BRANCH: refs/pull/${{ github.event.pull_request.number }}/merge
        run: |-
          ## Setting this to not fail the workflow while deleting cache keys.
          set +e
          while :; do
            echo "Fetching list of cache keys"
            mapfile -t cacheKeysForPR < <(gh cache list --ref "$BRANCH" --limit 100 --json id --jq '.[].id')
            if [[ ${#cacheKeysForPR[@]} -eq 0 ]]; then
              break
            fi

            echo "Deleting caches..."
            deleted=0
            for cacheKey in "${cacheKeysForPR[@]}"; do
              echo "Deleting cache with key: ${cacheKey}"
              if gh cache delete "$cacheKey"; then
                deleted=$((deleted + 1))
              fi
            done

            ## Stop if nothing was deleted this pass to avoid looping forever.
            if [[ "$deleted" -eq 0 ]]; then
              break
            fi
          done
          echo "Done"
